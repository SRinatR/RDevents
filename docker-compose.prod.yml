services:
  postgres:
    image: postgres:17-alpine
    container_name: event-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: event_platform
      POSTGRES_USER: event_platform_user
      POSTGRES_PASSWORD: event_platform_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_platform_user -d event_platform"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./services/api/Dockerfile
      target: prod
    container_name: event-platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      REGISTRATION_CODE_TTL: ${REGISTRATION_CODE_TTL:-360}
      REGISTRATION_COMPLETION_TTL: ${REGISTRATION_COMPLETION_TTL:-1800}
      REGISTRATION_MAX_ATTEMPTS: ${REGISTRATION_MAX_ATTEMPTS:-5}
      REGISTRATION_RESEND_COOLDOWN: ${REGISTRATION_RESEND_COOLDOWN:-60}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MEDIA_STORAGE_DRIVER: ${MEDIA_STORAGE_DRIVER:-local}
      MEDIA_UPLOAD_DIR: ${MEDIA_UPLOAD_DIR:-./uploads}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-https://api.rdevents.uz/uploads}
      MAX_AVATAR_UPLOAD_MB: ${MAX_AVATAR_UPLOAD_MB:-3}
      MAX_DOCUMENT_UPLOAD_MB: ${MAX_DOCUMENT_UPLOAD_MB:-10}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-RDEvents}
      RESEND_REPLY_TO_EMAIL: ${RESEND_REPLY_TO_EMAIL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - api_uploads:/app/services/api/uploads

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: event-platform-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  api_uploads:
