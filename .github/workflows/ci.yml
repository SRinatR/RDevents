name: CI

on:
  pull_request:
    branches:
      - main
      - production
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24'
  PNPM_VERSION: '10.33.1'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  shellcheck:
    name: Shell validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate host script syntax
        run: bash -n host-scripts/build-system-report.sh

      - name: Runtime redaction smoke test
        run: |
          set -euo pipefail

          out="$(bash host-scripts/build-system-report.sh --self-test-redaction)"

          printf '%s\n' "$out" | grep -q 'DATABASE_URL=\[REDACTED\]'
          printf '%s\n' "$out" | grep -q '# vault:\[REDACTED\]|ok'
          printf '%s\n' "$out" | grep -q 'JWT_TOKEN=\[REDACTED\]'
          printf '%s\n' "$out" | grep -q 'RESEND_API_KEY=\[REDACTED\]'
          printf '%s\n' "$out" | grep -q 'POSTGRES_PASSWORD=\[REDACTED\]'

          ! printf '%s\n' "$out" | grep -q 'postgres://secret'
          ! printf '%s\n' "$out" | grep -q 'vault:secret'
          ! printf '%s\n' "$out" | grep -q 'abc123'
          ! printf '%s\n' "$out" | grep -q 're_123'
          ! printf '%s\n' "$out" | grep -q 'supersecret'

          echo "Redaction test passed"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@127.0.0.1:5432/event_platform?schema=public
      # Runner-only placeholder for Prisma tooling.
      # This job does not run inside docker-compose network and must not claim production topology parity.
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: test
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @event-platform/api prisma:generate

      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: event_platform
          POSTGRES_USER: event_platform_user
          POSTGRES_PASSWORD: event_platform_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U event_platform_user -d event_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        env:
          DATABASE_URL: postgresql://event_platform_user:event_platform_password@127.0.0.1:5432/event_platform?schema=public
          # Runner-based test topology: postgres is exposed to the runner on 127.0.0.1:5432.
          # This is not the production compose-network contract.
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          CORS_ORIGIN: http://localhost:3000
          APP_URL: http://localhost:3000
          DEFAULT_LOCALE: ru
          NODE_ENV: test
          PORT: 4000
        run: |
          pnpm --filter @event-platform/api prisma:generate
          pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@127.0.0.1:5432/event_platform?schema=public
      # Runner-only placeholder for build-time Prisma tooling.
      # This job does not prove docker-compose network reachability and must not claim production topology parity.
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: production
      PORT: 4000
      NEXT_PUBLIC_API_BASE_URL: https://api.rdevents.uz
      RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @event-platform/api prisma:generate

      - name: Run build
        run: pnpm build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - lint
      - shellcheck
      - typecheck
      - test
      - build

    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.rdevents.uz
      RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker compose build
        run: docker compose -f docker-compose.prod.yml build api web

  container-smoke:
    name: Container Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - docker-build

    env:
      RELEASE_SHA: ${{ github.sha }}
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@postgres:5432/event_platform?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: production
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start postgres
        run: docker compose -f docker-compose.prod.yml up -d postgres

      - name: Wait for postgres
        run: |
          set -euo pipefail
          CID=$(docker compose -f docker-compose.prod.yml ps -q postgres)
          for i in $(seq 1 30); do
            HEALTH=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "$CID")
            if [ "$HEALTH" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs --tail=100 postgres
          exit 1

      - name: Run migrations
        run: |
          echo "DATABASE_URL inside api container: $DATABASE_URL"
          docker compose -f docker-compose.prod.yml run --rm --no-deps --entrypoint sh api -lc \
            'echo "Effective DATABASE_URL: $DATABASE_URL" && cd /app/services/api && pnpm exec prisma migrate deploy'

      - name: Start api and web
        run: docker compose -f docker-compose.prod.yml up -d api web

      - name: Wait for api and web
        run: |
          set -euo pipefail
          for service in api web; do
            CID=$(docker compose -f docker-compose.prod.yml ps -q "$service")
            for i in $(seq 1 40); do
              STATUS=$(docker inspect -f '{{.State.Status}}' "$CID")
              HEALTH=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$CID")
              if [ "$HEALTH" = "healthy" ] || { [ "$HEALTH" = "no-healthcheck" ] && [ "$STATUS" = "running" ]; }; then
                break
              fi
              sleep 2
            done
          done

      - name: Verify runtime contract
        run: |
          set -euo pipefail

          API_SHA=$(curl -fsS http://127.0.0.1:4000/release.json | sed -n 's/.*"releaseSha":"\([^"]*\)".*/\1/p')
          WEB_SHA=$(curl -fsS http://127.0.0.1:3000/release.json | sed -n 's/.*"releaseSha":"\([^"]*\)".*/\1/p')
          HTML_SHA=$(curl -fsS http://127.0.0.1:3000/ru | sed -n 's/.*app-release-sha" content="\([^"]*\)".*/\1/p')

          test "$API_SHA" = "$RELEASE_SHA"
          test "$WEB_SHA" = "$RELEASE_SHA"
          test "$HTML_SHA" = "$RELEASE_SHA"

          curl -fsS http://127.0.0.1:4000/health > /dev/null
          curl -fsS http://127.0.0.1:4000/ready > /dev/null
          curl -fsS http://127.0.0.1:3000/ru > /dev/null
          curl -fsS http://127.0.0.1:3000/ru/events > /dev/null

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - shellcheck
      - typecheck
      - test
      - build
      - docker-build
      - container-smoke

    steps:
      - name: Validate upstream jobs
        run: |
          set -euo pipefail

          echo "lint=${{ needs.lint.result }}"
          echo "shellcheck=${{ needs.shellcheck.result }}"
          echo "typecheck=${{ needs.typecheck.result }}"
          echo "test=${{ needs.test.result }}"
          echo "build=${{ needs.build.result }}"
          echo "docker-build=${{ needs.docker-build.result }}"
          echo "container-smoke=${{ needs.container-smoke.result }}"

          [ "${{ needs.lint.result }}" = "success" ] || exit 1
          [ "${{ needs.shellcheck.result }}" = "success" ] || exit 1
          [ "${{ needs.typecheck.result }}" = "success" ] || exit 1
          [ "${{ needs.test.result }}" = "success" ] || exit 1
          [ "${{ needs.build.result }}" = "success" ] || exit 1
          [ "${{ needs.docker-build.result }}" = "success" ] || exit 1
          [ "${{ needs.container-smoke.result }}" = "success" ] || exit 1

          echo "All required checks passed."