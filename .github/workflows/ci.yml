name: CI

on:
  push:
    branches:
      - main
      - develop
      - production
  pull_request:
    branches:
      - main
      - develop

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.6.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.6.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
