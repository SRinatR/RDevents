name: CI

on:
  pull_request:
    branches:
      - main
      - production
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24'
  PNPM_VERSION: '10.33.0'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@localhost:5432/event_platform?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: test
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @event-platform/api prisma:generate

      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: event_platform
          POSTGRES_USER: event_platform_user
          POSTGRES_PASSWORD: event_platform_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U event_platform_user -d event_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@127.0.0.1:5432/event_platform?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: test
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @event-platform/api prisma:generate

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@localhost:5432/event_platform?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: production
      PORT: 4000
      NEXT_PUBLIC_API_BASE_URL: https://api.rdevents.uz
      RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @event-platform/api prisma:generate

      - name: Run build
        run: pnpm build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - lint
      - typecheck
      - test
      - build

    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.rdevents.uz
      RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker compose build
        run: docker compose -f docker-compose.prod.yml build api web

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - typecheck
      - test
      - build
      - docker-build

    steps:
      - name: Validate upstream jobs
        run: |
          set -euo pipefail

          echo "lint=${{ needs.lint.result }}"
          echo "typecheck=${{ needs.typecheck.result }}"
          echo "test=${{ needs.test.result }}"
          echo "build=${{ needs.build.result }}"
          echo "docker-build=${{ needs.docker-build.result }}"

          [ "${{ needs.lint.result }}" = "success" ] || exit 1
          [ "${{ needs.typecheck.result }}" = "success" ] || exit 1
          [ "${{ needs.test.result }}" = "success" ] || exit 1
          [ "${{ needs.build.result }}" = "success" ] || exit 1
          [ "${{ needs.docker-build.result }}" = "success" ] || exit 1

          echo "All required checks passed."