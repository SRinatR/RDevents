name: CI

on:
  pull_request:
    branches:
      - main
      - production
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Required Checks aggregates every upstream job. If an older run is auto-cancelled,
  # the aggregate job can fail only because upstream jobs report "cancelled".
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24'
  PNPM_VERSION: '10.33.2'

jobs:
  production-safety:
    name: Production Safety
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run production safety validation
        run: bash ops/ci-validate-production-safety.sh

  shell-validation:
    name: Shell Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tracked shell scripts
        run: |
          set -euo pipefail
          git ls-files '*.sh' | xargs -r bash -n

      - name: Validate workflow scripts
        run: |
          set -euo pipefail
          bash -n ops/deploy-production.sh
          bash -n ops/verify-production-release.sh
          bash -n ops/rollback-production.sh
          bash -n ops/rollback-code.sh

  production-compose-config:
    name: Production Compose Config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production-style env
        run: bash ops/write-ci-production-env.sh "$RUNNER_TEMP/production.env"

      - name: Validate production compose config
        run: |
          set -euo pipefail
          grep -Eq '^DATABASE_URL=.*@postgres:5432/' "$RUNNER_TEMP/production.env"
          docker compose --env-file "$RUNNER_TEMP/production.env" -f docker-compose.prod.yml config --quiet

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@127.0.0.1:5432/event_platform?schema=public
      # Runner-only placeholder for Prisma tooling.
      # This job does not run inside docker-compose network and must not claim production topology parity.
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: test
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @event-platform/api prisma:generate

      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: event_platform
          POSTGRES_USER: event_platform_user
          POSTGRES_PASSWORD: event_platform_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U event_platform_user -d event_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for postgres service
        run: |
          set -euo pipefail
          node - <<'NODE'
          const net = require('node:net');

          const deadline = Date.now() + 60_000;

          function check() {
            const socket = net.connect(5432, '127.0.0.1');
            socket.setTimeout(1000);
            socket.once('connect', () => {
              socket.destroy();
              console.log('Postgres TCP port is reachable.');
            });
            socket.once('error', retry);
            socket.once('timeout', () => {
              socket.destroy();
              retry();
            });
          }

          function retry() {
            if (Date.now() > deadline) {
              console.error('Timed out waiting for Postgres on 127.0.0.1:5432.');
              process.exit(1);
            }
            setTimeout(check, 1000);
          }

          check();
          NODE

      - name: Run tests
        env:
          DATABASE_URL: postgresql://event_platform_user:event_platform_password@127.0.0.1:5432/event_platform?schema=public
          # Runner-based test topology: postgres is exposed to the runner on 127.0.0.1:5432.
          # This is not the production compose-network contract.
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          CORS_ORIGIN: http://localhost:3000
          APP_URL: http://localhost:3000
          DEFAULT_LOCALE: ru
          NODE_ENV: test
          PORT: 4000
        run: |
          pnpm --filter @event-platform/api prisma:generate
          pnpm --filter @event-platform/api prisma:deploy
          pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@postgres:5432/event_platform?schema=public
      # Production-style placeholder for build-time Prisma tooling. The build must not
      # require a live database connection.
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: production
      PORT: 4000
      NEXT_PUBLIC_API_BASE_URL: https://api.rdevents.uz
      RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @event-platform/api prisma:generate

      - name: Run build
        run: pnpm build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - production-safety
      - shell-validation
      - production-compose-config
      - lint
      - typecheck
      - test
      - build

    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.rdevents.uz
      RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare production-style env
        run: bash ops/write-ci-production-env.sh "$RUNNER_TEMP/production.env"

      - name: Docker compose build
        run: docker compose --env-file "$RUNNER_TEMP/production.env" -f docker-compose.prod.yml build api web report-worker email-broadcast-worker

  container-smoke:
    name: Container Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - docker-build

    env:
      COMPOSE_PROJECT_NAME: rdevents_ci_${{ github.run_id }}
      PRODUCTION_ENV_FILE: ${{ runner.temp }}/production.env
      CI_DEPLOY_ROOT: ${{ runner.temp }}/rdevents
      RELEASE_SHA: ${{ github.sha }}
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
      DATABASE_URL: postgresql://event_platform_user:event_platform_password@postgres:5432/event_platform?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000
      DEFAULT_LOCALE: ru
      NODE_ENV: production
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production-style runtime
        run: |
          set -euo pipefail
          bash ops/write-ci-production-env.sh "$PRODUCTION_ENV_FILE"
          mkdir -p "$CI_DEPLOY_ROOT/backups" "$CI_DEPLOY_ROOT/runtime"
          sudo mkdir -p /opt/rdevents/runtime/reports
          sudo chmod -R 777 /opt/rdevents

      - name: Build production images
        run: docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml build api web report-worker email-broadcast-worker

      - name: Start postgres
        run: docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml up -d postgres

      - name: Wait for postgres
        run: |
          set -euo pipefail
          wait_for_service_healthy() {
            local service="$1"
            local timeout_seconds="$2"
            local elapsed=0
            local cid status health

            cid="$(docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml ps -q "$service")"
            if [ -z "$cid" ]; then
              echo "Container for service '$service' was not created."
              return 1
            fi

            while [ "$elapsed" -lt "$timeout_seconds" ]; do
              status="$(docker inspect -f '{{.State.Status}}' "$cid")"
              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$cid")"
              echo "$service status=$status health=$health elapsed=${elapsed}s"

              if [ "$health" = "healthy" ] || { [ "$health" = "no-healthcheck" ] && [ "$status" = "running" ]; }; then
                return 0
              fi

              if [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
                return 1
              fi

              sleep 3
              elapsed=$((elapsed + 3))
            done

            return 1
          }

          wait_for_service_healthy postgres 120 || {
            docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml ps
            docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml logs --tail=120 postgres
            exit 1
          }

      - name: Verify production database URL contract
        run: |
          set -euo pipefail
          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml run --rm --no-deps --entrypoint sh api -lc '
            case "$DATABASE_URL" in
              *@postgres:5432/*)
                echo "DATABASE_URL uses postgres:5432 inside compose."
                ;;
              *)
                echo "DATABASE_URL must use postgres:5432 inside compose. Got: $DATABASE_URL"
                exit 1
                ;;
            esac
          '

      - name: Run migrations
        run: |
          set -euo pipefail
          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml run --rm --no-deps --entrypoint sh api -lc \
            'cd /app/services/api && pnpm exec prisma migrate deploy'

      - name: Smoke predeploy backup package
        run: |
          set -euo pipefail

          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml run --rm --no-deps --entrypoint sh api -lc \
            'mkdir -p /app/services/api/uploads && printf "ci upload smoke\n" > /app/services/api/uploads/ci-upload-smoke.txt'

          API_IMAGE_ID="$(docker image inspect app-api:latest --format '{{.Id}}')"
          WEB_IMAGE_ID="$(docker image inspect app-web:latest --format '{{.Id}}')"

          BACKUP_DIR="$(
            DEPLOY_ROOT="$CI_DEPLOY_ROOT" \
            APP_DIR="$GITHUB_WORKSPACE" \
            ENV_FILE="$PRODUCTION_ENV_FILE" \
            COMPOSE_FILE="$GITHUB_WORKSPACE/docker-compose.prod.yml" \
            RELEASE_SHA="$RELEASE_SHA" \
            MIN_DB_BACKUP_BYTES=1 \
            ALLOW_BUSINESS_CHECK_FAILURE=true \
            API_IMAGE_ID_AFTER="$API_IMAGE_ID" \
            WEB_IMAGE_ID_AFTER="$WEB_IMAGE_ID" \
            bash ops/create-predeploy-backup.sh
          )"

          test -s "$BACKUP_DIR/db.sql.gz"
          gzip -t "$BACKUP_DIR/db.sql.gz"
          tar -tzf "$BACKUP_DIR/uploads.tar.gz" >/dev/null
          test -s "$BACKUP_DIR/deploy-manifest.json"

      - name: Start api, web, and workers
        run: docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml up -d --no-build api web report-worker email-broadcast-worker

      - name: Wait for app services
        run: |
          set -euo pipefail
          wait_for_service_healthy() {
            local service="$1"
            local timeout_seconds="$2"
            local elapsed=0
            local cid status health

            cid="$(docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml ps -q "$service")"
            if [ -z "$cid" ]; then
              echo "Container for service '$service' was not created."
              return 1
            fi

            while [ "$elapsed" -lt "$timeout_seconds" ]; do
              status="$(docker inspect -f '{{.State.Status}}' "$cid")"
              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$cid")"
              echo "$service status=$status health=$health elapsed=${elapsed}s"

              if [ "$health" = "healthy" ] || { [ "$health" = "no-healthcheck" ] && [ "$status" = "running" ]; }; then
                return 0
              fi

              if [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
                return 1
              fi

              sleep 3
              elapsed=$((elapsed + 3))
            done

            return 1
          }

          for service in api web report-worker email-broadcast-worker; do
            wait_for_service_healthy "$service" 240 || {
              docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml ps
              docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml logs --tail=160 "$service"
              exit 1
            }
          done

      - name: Verify runtime contract
        run: |
          set -euo pipefail

          API_SHA=$(curl -fsS http://127.0.0.1:4000/release.json | sed -n 's/.*"releaseSha":"\([^"]*\)".*/\1/p')
          WEB_SHA=$(curl -fsS http://127.0.0.1:3000/release.json | sed -n 's/.*"releaseSha":"\([^"]*\)".*/\1/p')
          HTML_SHA=$(curl -fsS http://127.0.0.1:3000/ru | sed -n 's/.*app-release-sha" content="\([^"]*\)".*/\1/p')

          test "$API_SHA" = "$RELEASE_SHA"
          test "$WEB_SHA" = "$RELEASE_SHA"
          test "$HTML_SHA" = "$RELEASE_SHA"

          curl -fsS http://127.0.0.1:4000/health > /dev/null
          curl -fsS http://127.0.0.1:4000/ready > /dev/null
          curl -fsS http://127.0.0.1:4000/version | grep -Fx "$RELEASE_SHA"
          curl -fsS http://127.0.0.1:4000/api/version | grep -Fx "$RELEASE_SHA"
          curl -fsS http://127.0.0.1:3000/version.txt | grep -Fx "$RELEASE_SHA"
          curl -fsS http://127.0.0.1:3000/ru > /dev/null
          curl -fsS http://127.0.0.1:3000/ru/events > /dev/null

          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml exec -T api sh -lc \
            'test "$(cat /app/services/api/release.txt)" = "$RELEASE_SHA"'

          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml exec -T web sh -lc \
            'test "$(cat /app/apps/web/public/version.txt)" = "$RELEASE_SHA"'

          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml exec -T report-worker sh -lc \
            'test "$(cat /app/services/api/release.txt)" = "$RELEASE_SHA"'

          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml exec -T email-broadcast-worker sh -lc \
            'test "$(cat /app/services/api/release.txt)" = "$RELEASE_SHA"'

      - name: Dump compose diagnostics
        if: failure()
        run: |
          set +e
          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml ps
          docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml logs --tail=200 postgres api web report-worker email-broadcast-worker

      - name: Stop production compose stack
        if: always()
        run: |
          set +e
          if [ -f "$PRODUCTION_ENV_FILE" ]; then
            docker compose --env-file "$PRODUCTION_ENV_FILE" -f docker-compose.prod.yml down -v --remove-orphans
          fi

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - production-safety
      - shell-validation
      - production-compose-config
      - lint
      - typecheck
      - test
      - build
      - docker-build
      - container-smoke

    steps:
      - name: Validate upstream jobs
        run: |
          set -euo pipefail

          require_success() {
            local job="$1"
            local result="$2"

            echo "${job}=${result}"
            if [ "$result" != "success" ]; then
              echo "::error title=Required upstream job did not pass::${job} finished with status '${result}'"
              exit 1
            fi
          }

          require_success "production-safety" "${{ needs.production-safety.result }}"
          require_success "shell-validation" "${{ needs.shell-validation.result }}"
          require_success "production-compose-config" "${{ needs.production-compose-config.result }}"
          require_success "lint" "${{ needs.lint.result }}"
          require_success "typecheck" "${{ needs.typecheck.result }}"
          require_success "test" "${{ needs.test.result }}"
          require_success "build" "${{ needs.build.result }}"
          require_success "docker-build" "${{ needs.docker-build.result }}"
          require_success "container-smoke" "${{ needs.container-smoke.result }}"

          echo "All required checks passed."
