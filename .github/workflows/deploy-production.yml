name: Deploy production

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_ROOT: /opt/rdevents
  APP_DIR: /opt/rdevents/app
  ARCHIVE_NAME: deploy.tgz

jobs:
  validate-ref:
    name: Validate production ref
    runs-on: ubuntu-latest
    steps:
      - name: Confirm production branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/production" ]; then
            echo "Production deploy can only run from refs/heads/production."
            echo "Current ref: $GITHUB_REF"
            exit 1
          fi

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: validate-ref
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm deployment commit
        run: echo "Deploying $GITHUB_SHA from $GITHUB_REF"

      - name: Prepare SSH
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Pack project
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/$ARCHIVE_NAME"

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.env \
            --exclude=.env.production \
            --exclude=node_modules \
            --exclude=deploy.tgz \
            -czf "$ARCHIVE_PATH" .

          ls -lh "$ARCHIVE_PATH"

      - name: Upload archive
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/$ARCHIVE_NAME"

          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "mkdir -p $DEPLOY_ROOT"
          scp -P "$PROD_PORT" -i ~/.ssh/id_ed25519 "$ARCHIVE_PATH" "$PROD_USER@$PROD_HOST:$DEPLOY_ROOT/$ARCHIVE_NAME"

      - name: Write env file on server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "mkdir -p $DEPLOY_ROOT"
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "cat > $DEPLOY_ROOT/.env" <<< "$PROD_ENV_FILE"

      - name: Deploy on server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "DEPLOY_ROOT='$DEPLOY_ROOT' APP_DIR='$APP_DIR' ARCHIVE_NAME='$ARCHIVE_NAME' RELEASE_SHA='$GITHUB_SHA' bash -se" << 'EOF'
            set -euo pipefail

            mkdir -p "$APP_DIR"
            find "$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            tar -xzf "$DEPLOY_ROOT/$ARCHIVE_NAME" -C "$APP_DIR"
            rm -f "$DEPLOY_ROOT/$ARCHIVE_NAME"
            printf '%s\n' "$RELEASE_SHA" > "$APP_DIR/.release-commit"

            cd "$APP_DIR"

            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml down --remove-orphans || true
            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml up -d postgres

            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml \
              exec -T postgres sh -lc 'until pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done'
            echo "Postgres is healthy"

            BACKUP_DIR="$DEPLOY_ROOT/backups"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-migrate-$(date +%Y%m%d-%H%M%S).sql.gz"

            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml \
              exec -T postgres sh -lc 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
              | gzip > "$BACKUP_FILE"

            test -s "$BACKUP_FILE"
            echo "Backup written to $BACKUP_FILE ($(du -sh "$BACKUP_FILE" | cut -f1))"

            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml \
              run --rm --no-deps --build api pnpm prisma:deploy

            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml up -d --build --remove-orphans

            docker image prune -f
            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml ps
          EOF

      - name: Wait for services to start
        run: sleep 30

      - name: Smoke test - API container is running
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "docker compose --env-file '$DEPLOY_ROOT/.env' -f '$APP_DIR/docker-compose.prod.yml' ps --status running --services | grep -qx api" \
            || { echo "API container is not running"; exit 1; }

      - name: Smoke test - Web container is running
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "docker compose --env-file '$DEPLOY_ROOT/.env' -f '$APP_DIR/docker-compose.prod.yml' ps --status running --services | grep -qx web" \
            || { echo "Web container is not running"; exit 1; }

      - name: Smoke test - API health via wget
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "docker compose --env-file '$DEPLOY_ROOT/.env' -f '$APP_DIR/docker-compose.prod.yml' exec -T api wget --spider -q http://127.0.0.1:4000/health" \
            || { echo "API health check failed"; exit 1; }

      - name: Smoke test - API ready via wget
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "docker compose --env-file '$DEPLOY_ROOT/.env' -f '$APP_DIR/docker-compose.prod.yml' exec -T api wget --spider -q http://127.0.0.1:4000/ready" \
            || { echo "API ready check failed"; exit 1; }

      - name: Smoke test - Web /ru via wget
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' APP_DIR='$APP_DIR' bash -se" << 'EOF'
            set -euo pipefail

            for attempt in $(seq 1 30); do
              if docker compose --env-file "$DEPLOY_ROOT/.env" -f "$APP_DIR/docker-compose.prod.yml" exec -T web wget --spider -q http://127.0.0.1:3000/ru; then
                exit 0
              fi

              echo "Waiting for web /ru ($attempt/30)..."
              sleep 2
            done

            echo "Web /ru check failed"
            docker compose --env-file "$DEPLOY_ROOT/.env" -f "$APP_DIR/docker-compose.prod.yml" ps
            docker compose --env-file "$DEPLOY_ROOT/.env" -f "$APP_DIR/docker-compose.prod.yml" logs --tail=80 web
            exit 1
          EOF

      - name: Deployment complete
        run: echo "Deployment and smoke tests completed successfully"
