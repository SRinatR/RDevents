name: Deploy production

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_ROOT: /opt/rdevents
  APP_DIR: /opt/rdevents/app
  ARCHIVE_NAME: deploy.tgz

jobs:
  validate-ref:
    name: Validate production ref
    runs-on: ubuntu-latest

    outputs:
      release_sha: ${{ steps.resolve.outputs.release_sha }}
      release_ref: ${{ steps.resolve.outputs.release_ref }}

    steps:
      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/production" ]; then
            echo "Production deploy can only run from refs/heads/production."
            echo "Current ref: ${GITHUB_REF}"
            exit 1
          fi

          echo "release_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "Validated deploy from production."

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - validate-ref
    environment: production

    env:
      RELEASE_SHA: ${{ needs.validate-ref.outputs.release_sha }}

    steps:
      - name: Checkout exact release SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-ref.outputs.release_ref }}

      - name: Validate deploy scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n ops/deploy-production.sh
          bash -n ops/verify-production-release.sh

      - name: Confirm deployment commit
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploying RELEASE_SHA=${RELEASE_SHA}"
          echo "Deploying GITHUB_REF=${GITHUB_REF}"

      - name: Prepare SSH
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Pack project
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/$ARCHIVE_NAME"

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.env \
            --exclude=.env.production \
            --exclude=node_modules \
            --exclude=deploy.tgz \
            -czf "$ARCHIVE_PATH" .

          ls -lh "$ARCHIVE_PATH"

      - name: Upload archive
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/$ARCHIVE_NAME"

          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "mkdir -p '$DEPLOY_ROOT'"
          scp -P "$PROD_PORT" -i ~/.ssh/id_ed25519 "$ARCHIVE_PATH" "$PROD_USER@$PROD_HOST:$DEPLOY_ROOT/$ARCHIVE_NAME"

      - name: Write env file on server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "mkdir -p '$DEPLOY_ROOT'"
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "cat > '$DEPLOY_ROOT/.env'" <<< "$PROD_ENV_FILE"

      - name: Upload deploy scripts
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          scp -P "$PROD_PORT" -i ~/.ssh/id_ed25519 \
            ops/deploy-production.sh \
            "$PROD_USER@$PROD_HOST:/tmp/rdevents-deploy-production.sh"
          scp -P "$PROD_PORT" -i ~/.ssh/id_ed25519 \
            ops/verify-production-release.sh \
            "$PROD_USER@$PROD_HOST:/tmp/rdevents-verify-production-release.sh"
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "chmod 700 /tmp/rdevents-deploy-production.sh /tmp/rdevents-verify-production-release.sh"

      - name: Deploy on server
        id: deploy_server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail

          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' APP_DIR='$APP_DIR' ARCHIVE_NAME='$ARCHIVE_NAME' RELEASE_SHA='$RELEASE_SHA' bash /tmp/rdevents-deploy-production.sh"

      - name: Verify deployed release on server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail

          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' APP_DIR='$APP_DIR' RELEASE_SHA='$RELEASE_SHA' bash /tmp/rdevents-verify-production-release.sh"

      - name: Read deploy result from server
        if: always()
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set +e

          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" << 'EOF'
            echo "=== deploy-state.json ==="
            cat /opt/rdevents/runtime/deploy-state.json 2>/dev/null || echo "(no state file)"
            echo

            echo "=== .release-commit ==="
            cat /opt/rdevents/app/.release-commit 2>/dev/null || echo "NO .release-commit"
            echo

            echo "=== .release-completed ==="
            cat /opt/rdevents/app/.release-completed 2>/dev/null || echo "NO .release-completed"
            echo

            echo "=== docker compose ps ==="
            docker compose --env-file /opt/rdevents/.env -f /opt/rdevents/app/docker-compose.prod.yml ps 2>&1 || true
            echo

            echo "=== container release markers ==="
            docker compose --env-file /opt/rdevents/.env -f /opt/rdevents/app/docker-compose.prod.yml exec -T api sh -lc 'cat /app/services/api/release.txt' 2>/dev/null || echo "(cannot read api release.txt)"
            docker compose --env-file /opt/rdevents/.env -f /opt/rdevents/app/docker-compose.prod.yml exec -T web sh -lc 'cat /app/apps/web/public/version.txt' 2>/dev/null || echo "(cannot read web version.txt)"
            docker compose --env-file /opt/rdevents/.env -f /opt/rdevents/app/docker-compose.prod.yml exec -T report-worker sh -lc 'cat /app/services/api/release.txt' 2>/dev/null || echo "(cannot read report-worker release.txt)"
            docker compose --env-file /opt/rdevents/.env -f /opt/rdevents/app/docker-compose.prod.yml exec -T email-broadcast-worker sh -lc 'cat /app/services/api/release.txt' 2>/dev/null || echo "(cannot read email-broadcast-worker release.txt)"
            echo

            echo "=== public releases ==="
            curl -fsS "https://rdevents.uz/release.json?ts=$(date +%s)" 2>/dev/null || echo "(cannot fetch web release.json)"
            echo
            curl -fsS "https://api.rdevents.uz/release.json?ts=$(date +%s)" 2>/dev/null || echo "(cannot fetch api release.json)"
            echo
            curl -fsS "https://rdevents.uz/version.txt?ts=$(date +%s)" 2>/dev/null || echo "(cannot fetch web version.txt)"
            echo
          EOF

          exit 0

      - name: Deployment complete
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploy production completed and verified for SHA ${RELEASE_SHA}"
