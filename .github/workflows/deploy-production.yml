name: Deploy production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_ROOT: /opt/rdevents
  APP_DIR: /opt/rdevents/app
  ARCHIVE_NAME: deploy.tgz

jobs:
  validate-ref:
    name: Validate production ref
    runs-on: ubuntu-latest
    steps:
      - name: Confirm production branch
        shell: bash
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            if [ "${GITHUB_WORKFLOW}" != "CI" ]; then
              echo "This workflow should only be triggered by the CI workflow."
              exit 1
            fi
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "CI workflow did not pass (conclusion: ${{ github.event.workflow_run.conclusion }}). Deployment is blocked."
              exit 1
            fi
            if [ "${{ github.event.workflow_run.head_branch }}" != "production" ]; then
              echo "CI workflow was not triggered from production branch (head_branch: ${{ github.event.workflow_run.head_branch }})."
              exit 1
            fi
            echo "CI passed on production. Proceeding with deployment."
            echo "RELEASE_SHA=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF}" != "refs/heads/production" ]; then
              echo "Manual deploy is only allowed from refs/heads/production."
              echo "Current ref: ${GITHUB_REF}"
              exit 1
            fi
            echo "RELEASE_SHA=${GITHUB_SHA}" >> $GITHUB_ENV
            echo "Manual deploy triggered from production. Proceeding."
          else
            echo "Deploy production can only be triggered by workflow_run (CI completed) or workflow_dispatch."
            exit 1
          fi

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: [validate-ref]
    environment: production

    steps:
      - name: Checkout exact SHA from CI
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Confirm deployment commit
        run: echo "Deploying ${RELEASE_SHA}"

      - name: Prepare SSH
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Pack project
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/$ARCHIVE_NAME"

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.env \
            --exclude=.env.production \
            --exclude=node_modules \
            --exclude=deploy.tgz \
            -czf "$ARCHIVE_PATH" .

          ls -lh "$ARCHIVE_PATH"

      - name: Upload archive
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/$ARCHIVE_NAME"

          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "mkdir -p $DEPLOY_ROOT"
          scp -P "$PROD_PORT" -i ~/.ssh/id_ed25519 "$ARCHIVE_PATH" "$PROD_USER@$PROD_HOST:$DEPLOY_ROOT/$ARCHIVE_NAME"

      - name: Write env file on server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "mkdir -p $DEPLOY_ROOT"
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "cat > $DEPLOY_ROOT/.env" <<< "$PROD_ENV_FILE"

      - name: Deploy on server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' APP_DIR='$APP_DIR' ARCHIVE_NAME='$ARCHIVE_NAME' RELEASE_SHA='${RELEASE_SHA}' bash -se" << 'EOF'
            set -euo pipefail

            mkdir -p "$APP_DIR"
            find "$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            tar -xzf "$DEPLOY_ROOT/$ARCHIVE_NAME" -C "$APP_DIR"
            rm -f "$DEPLOY_ROOT/$ARCHIVE_NAME"
            printf '%s\n' "$RELEASE_SHA" > "$APP_DIR/.release-commit"

            RUNTIME_DIR="$DEPLOY_ROOT/runtime"
            mkdir -p "$RUNTIME_DIR"
            printf '%s\n' "$RELEASE_SHA" > "$RUNTIME_DIR/version.txt"
            printf '%s\n' "$RELEASE_SHA" > "$RUNTIME_DIR/version"
            printf '{"service":"event-platform-web","releaseSha":"%s"}\n' "$RELEASE_SHA" > "$RUNTIME_DIR/release.json"

            cd "$APP_DIR"

            echo "Release SHA: $RELEASE_SHA"
            export RELEASE_SHA
            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml build

            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml up -d postgres

            echo "Waiting for postgres to be healthy..."
            POSTGRES_CID=$(docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml ps -q postgres 2>/dev/null || true)
            if [ -z "$POSTGRES_CID" ]; then
              echo "Could not find postgres container ID — compose ps -q returned empty."
              docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml ps
              exit 1
            fi

            for i in $(seq 1 30); do
              HEALTH=$(docker inspect -f '{{.State.Health.Status}}' "$POSTGRES_CID" 2>/dev/null || echo "unknown")
              if [ "$HEALTH" = "healthy" ]; then
                echo "Postgres is healthy."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Postgres did not become healthy in time (last status: $HEALTH)."
                docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml ps
                docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml logs --tail=40 postgres
                exit 1
              fi
              echo "Waiting for postgres... ($i/30, status: $HEALTH)"
              sleep 2
            done

            BACKUP_DIR="$DEPLOY_ROOT/backups"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-migrate-$(date +%Y%m%d-%H%M%S).sql.gz"
            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml \
              exec -T postgres sh -lc 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
              | gzip > "$BACKUP_FILE"
            test -s "$BACKUP_FILE"
            echo "Backup written to $BACKUP_FILE ($(du -sh "$BACKUP_FILE" | cut -f1))"

            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml \
              run --rm --no-deps api pnpm prisma:deploy

            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml \
              up -d --force-recreate --remove-orphans api web

            verify_container_sha() {
              service="$1"
              path="$2"
              label="$3"

              actual=$(docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml \
                exec -T "$service" sh -lc "cat '$path'" 2>/dev/null | tr -d '\r\n')

              if [ "$actual" != "$RELEASE_SHA" ]; then
                echo "FAIL: $label container release is '$actual', expected '$RELEASE_SHA'."
                docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml ps
                docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml logs --tail=20 "$service"
                return 1
              fi
              echo "OK: $label container release = $actual"
              return 0
            }

            verify_http_sha() {
              url="$1"
              label="$2"

              body_file=$(mktemp)
              err_file=$(mktemp)
              ret=1

              for attempt in $(seq 1 15); do
                code=$(curl -sS -o "$body_file" -w "%{http_code}" "$url" 2>"$err_file" || true)
                body=$(cat "$body_file" 2>/dev/null || true)

                if [ "$code" = "200" ] && [ "$body" = "$RELEASE_SHA" ]; then
                  echo "OK: $label HTTP endpoint $url returned correct SHA: $body"
                  ret=0
                  break
                fi

                echo "Attempt $attempt/15: $label $url returned code=$code body='$body'"
                if [ "$attempt" -lt 15 ]; then
                  sleep 3
                fi
              done

              if [ $ret -ne 0 ]; then
                echo "FAIL: $label HTTP endpoint $url did not return expected SHA '$RELEASE_SHA'."
                echo "Last status: code=$code body='$(cat "$body_file" 2>/dev/null || true)'"
                echo "Last curl error: $(cat "$err_file" 2>/dev/null || true)"
              fi

              rm -f "$body_file" "$err_file"
              return $ret
            }

            FAILED=0

            verify_container_sha api "/app/services/api/release.txt" "API" || FAILED=1
            verify_container_sha web "/app/apps/web/public/release.txt" "Web" || FAILED=1

            verify_http_sha "http://127.0.0.1:4000/version" "API /version" || FAILED=1
            verify_http_sha "http://127.0.0.1:4000/api/version" "API /api/version" || FAILED=1
            verify_http_sha "http://127.0.0.1:3000/version.txt" "Web /version.txt" || FAILED=1
            verify_http_sha "http://127.0.0.1:3000/release.json" "Web /release.json" || FAILED=1

            if [ $FAILED -ne 0 ]; then
              echo ""
              echo "=========================================="
              echo "DEPLOYMENT FAILED: SHA verification failed."
              echo "Expected RELEASE_SHA: $RELEASE_SHA"
              echo "=========================================="
              docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml ps
              exit 1
            fi

            echo ""
            echo "=========================================="
            echo "DEPLOYMENT SUCCESS: All containers are running the correct release."
            echo "Release SHA: $RELEASE_SHA"
            echo "=========================================="
            docker image prune -f
            docker compose --env-file "$DEPLOY_ROOT/.env" -f docker-compose.prod.yml ps
          EOF

      - name: Final status
        run: echo "Deploy production completed for SHA ${RELEASE_SHA}"
