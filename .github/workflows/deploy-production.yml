name: Deploy production

on:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy and smoke test
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup pnpm
        run: npm install -g pnpm@10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Prepare SSH
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Pack project
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/deploy.tgz"

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.env \
            --exclude=.env.production \
            --exclude=node_modules \
            --exclude=deploy.tgz \
            -czf "$ARCHIVE_PATH" .

          ls -lh "$ARCHIVE_PATH"

      - name: Upload archive
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/deploy.tgz"

          scp -P "$PROD_PORT" -i ~/.ssh/id_ed25519 "$ARCHIVE_PATH" "$PROD_USER@$PROD_HOST:/opt/rdevents/deploy.tgz"

      - name: Write env file on server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "mkdir -p /opt/rdevents"
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" "cat > /opt/rdevents/.env" <<< "$PROD_ENV_FILE"

      - name: Deploy on server
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" << 'EOF'
            set -euo pipefail

            mkdir -p /opt/rdevents/app
            find /opt/rdevents/app -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            tar -xzf /opt/rdevents/deploy.tgz -C /opt/rdevents/app
            rm -f /opt/rdevents/deploy.tgz

            cd /opt/rdevents/app

            docker compose --env-file /opt/rdevents/.env -f docker-compose.prod.yml down --remove-orphans || true
            docker compose --env-file /opt/rdevents/.env -f docker-compose.prod.yml up -d --build --remove-orphans

            docker image prune -f
            docker compose --env-file /opt/rdevents/.env -f docker-compose.prod.yml ps
          EOF

      - name: Wait for services to start
        run: sleep 30

      - name: Smoke test - API health
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          API_URL="http://$(ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" 'docker compose -f /opt/rdevents/app/docker-compose.prod.yml port api 4000 2>/dev/null | sed "s/.*://")"
          API_HOST="$PROD_HOST"
          
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "docker compose -f /opt/rdevents/app/docker-compose.prod.yml exec -T api curl -sf http://localhost:4000/health" \
            || { echo "API health check failed"; exit 1; }

      - name: Smoke test - API ready
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "docker compose -f /opt/rdevents/app/docker-compose.prod.yml exec -T api curl -sf http://localhost:4000/ready" \
            || { echo "API ready check failed"; exit 1; }

      - name: Smoke test - Web root
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          set -euo pipefail
          ssh -p "$PROD_PORT" -i ~/.ssh/id_ed25519 "$PROD_USER@$PROD_HOST" \
            "docker compose -f /opt/rdevents/app/docker-compose.prod.yml exec -T web curl -sf http://localhost:3000 | head -c 100" \
            || { echo "Web root check failed"; exit 1; }

      - name: Deployment complete
        run: echo "Deployment and smoke tests completed successfully"