# Production nginx config snapshot for rdevents.uz
# Source: /etc/nginx/sites-available/rdevents on the current VPS
# Install by symlinking this file into /etc/nginx/sites-enabled/rdevents and reloading nginx.

server {
    listen 80;
    listen [::]:80;
    server_name rdevents.uz www.rdevents.uz api.rdevents.uz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name rdevents.uz www.rdevents.uz;

    ssl_certificate /etc/letsencrypt/live/rdevents.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rdevents.uz/privkey.pem;

    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /version.txt {
        default_type text/plain;
        alias /opt/rdevents/runtime/version.txt;
        add_header Cache-Control "no-store" always;
    }

    location = /release.json {
        default_type application/json;
        alias /opt/rdevents/runtime/release.json;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name api.rdevents.uz;

    ssl_certificate /etc/letsencrypt/live/rdevents.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rdevents.uz/privkey.pem;

    location = /version {
        default_type text/plain;
        alias /opt/rdevents/runtime/version;
        add_header Cache-Control "no-store" always;
    }

    location = /api/version {
        default_type text/plain;
        alias /opt/rdevents/runtime/version;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
